services:
  mongo:
    image: mongo:7
    container_name: mean-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    image: azharshaikh662/mean-backend:latest
    container_name: mean-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      - PORT=8080
      - MONGODB_URL=mongodb://mongo:27017/dd_db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    image: azharshaikh662/mean-frontend:latest
    container_name: mean-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  mongo_data:
