name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Backend
      run: docker build -t azharshaikh662/mean-backend:latest ./backend

    - name: Push Backend
      run: docker push azharshaikh662/mean-backend:latest

    - name: Build Frontend
      run: docker build -t azharshaikh662/mean-frontend:latest ./frontend

    - name: Push Frontend
      run: docker push azharshaikh662/mean-frontend:latest